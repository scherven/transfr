# Generates TransfrApp.xcodeproj — a thin device/simulator app target around the
# local Swift packages. The UI and models stay in TransfrApp/ (TransfrUI) and
# TransfrCore/; this project is just the @main shell (App/TransfrMain.swift) plus
# an app bundle to run on a simulator.
#
# Regenerate after changing this file:  xcodegen generate  (run in ios/)
name: TransfrApp
options:
  bundleIdPrefix: com.transfr
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  # Only TransfrApp is declared. It vends TransfrUI and already depends on
  # TransfrCore via `../TransfrCore` in its own Package.swift, so TransfrCore
  # resolves transitively. Declaring it a second time here registers the same
  # package under a different path and makes Xcode's resolver fail with
  # "missing package product TransfrCore".
  TransfrApp:
    path: TransfrApp

targets:
  TransfrApp:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: TransfrApp
        product: TransfrUI
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: transfr
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # The dev API is plain-HTTP on localhost; this exempts local hosts from
        # App Transport Security so the Simulator can reach the uvicorn server.
        # (Only localhost/*.local/link-local — not a blanket HTTP allowance.)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Location is one-shot / while-in-use: plan from the user's position and
        # place the live "you" dot. No background/Always usage in this scope.
        NSLocationWhenInUseUsageDescription: >-
          transfr uses your location to plan from where you are and to place you
          on the live route map. It's only read while the app is open.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.transfr.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        ENABLE_PREVIEWS: YES

schemes:
  TransfrApp:
    build:
      targets:
        TransfrApp: all
    run:
      config: Debug
      # Injected into the running app (read by TransfrUI/AppConfig). The key is
      # NOT stored here: `${TRANSFR_API_KEY}` is expanded from the shell at
      # `xcodegen generate` time, so export it from the gitignored secret first:
      #     export TRANSFR_API_KEY=$(cat ../deploy/secrets/api_key)
      #     xcodegen generate
      # The generated .xcodeproj is gitignored, so the baked key never lands in
      # git. Unset TRANSFR_API_URL or set TRANSFR_USE_SAMPLE=1 to run offline.
      environmentVariables:
        TRANSFR_API_URL: https://api.trans-fr.com
        TRANSFR_API_KEY: ${TRANSFR_API_KEY}
